name: Build Android APK
description: Set up the Android toolchain and build + verify a debug APK with Tauri.

inputs:
  version:
    description: Optional app version to stamp before building (e.g. 0.2.1). Leave blank to keep the committed version.
    required: false
    default: ""

outputs:
  apk-path:
    description: Path to the built (and verified) debug APK.
    value: ${{ steps.verify.outputs.apk }}

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: lts/*

    - name: Setup Java (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "17"

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android NDK
      shell: bash
      run: |
        sdkmanager "ndk;26.1.10909125" "platforms;android-34" "build-tools;34.0.0"
        echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> "$GITHUB_ENV"
        echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> "$GITHUB_ENV"

    - name: Install Rust + Android targets
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

    - name: Rust dependency cache
      uses: swatinem/rust-cache@v2
      with:
        workspaces: "./src-tauri -> target"

    - name: Install frontend dependencies
      shell: bash
      run: npm install

    - name: Set version
      if: inputs.version != ''
      shell: bash
      run: node scripts/set-version.mjs "${{ inputs.version }}"

    - name: Initialize Android project
      shell: bash
      run: npm run tauri android init -- --ci

    - name: Build Android APK (debug)
      shell: bash
      run: npm run tauri android build -- --debug --apk

    - name: Verify APK
      id: verify
      shell: bash
      run: |
        apk=$(find src-tauri/gen/android/app/build/outputs/apk -name '*.apk' | head -n1)
        if [ -z "$apk" ]; then echo "::error::No APK produced"; exit 1; fi
        echo "APK: $apk ($(du -h "$apk" | cut -f1))"
        unzip -l "$apk" | grep -q "AndroidManifest.xml" || { echo "::error::APK missing AndroidManifest.xml"; exit 1; }
        unzip -l "$apk" | grep -q "classes.dex" || { echo "::error::APK missing classes.dex"; exit 1; }
        echo "apk=$apk" >> "$GITHUB_OUTPUT"
        echo "APK verification passed."
