name: Android Build

# PR-gating Android build: verifies the app still builds for Android on every pull
# request (and on demand). The nightly/release workflows build and ATTACH the APK to
# their GitHub Releases; this one just uploads a workflow artifact.
on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Build & verify Android APK
        id: build
        uses: ./.github/actions/android-build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ics-309-logger-android-apk
          path: ${{ steps.build.outputs.apk-path }}
          if-no-files-found: error
