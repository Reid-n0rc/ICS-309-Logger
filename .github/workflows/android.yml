name: Android Build

# Build an Android APK with Tauri as part of CI: every pull request and push to main
# verifies the app still builds for Android, plus manual dispatch and version tags.
# Produces a debug-signed APK artifact you can install on a device.
on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;26.1.10909125" "platforms;android-34" "build-tools;34.0.0"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> "$GITHUB_ENV"

      - name: Install Rust + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust dependency cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm install

      - name: Initialize Android project
        run: npm run tauri android init -- --ci

      - name: Build Android APK (debug)
        run: npm run tauri android build -- --debug --apk

      - name: Verify APK
        run: |
          apk=$(find src-tauri/gen/android/app/build/outputs/apk -name '*.apk' | head -n1)
          if [ -z "$apk" ]; then echo "::error::No APK produced"; exit 1; fi
          echo "APK: $apk ($(du -h "$apk" | cut -f1))"
          # A valid APK is a ZIP archive that contains the Android manifest and dex code.
          unzip -l "$apk" | grep -q "AndroidManifest.xml" || { echo "::error::APK missing AndroidManifest.xml"; exit 1; }
          unzip -l "$apk" | grep -q "classes.dex" || { echo "::error::APK missing classes.dex"; exit 1; }
          echo "APK verification passed."

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ics-309-logger-android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
