name: Nightly Build

# On every push to main, build all platforms and publish them to a single rolling
# "nightly" pre-release (recreated each run so it always tracks the latest commit).
# Stable, versioned releases are handled separately by release.yml (on v* tags).
on:
  push:
    branches: [main]

concurrency:
  group: nightly
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # 1. Recreate the rolling "nightly" release as a fresh draft at the current commit.
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
      nightly_version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Compute nightly version (latest release patch + 1)
        id: ver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag=$(gh api "repos/${{ github.repository }}/releases/latest" --jq .tag_name 2>/dev/null || echo "")
          ver=${tag#v}
          if [ -z "$ver" ]; then ver="0.0.0"; fi
          IFS=. read -r MA MI PA <<< "$ver"
          echo "version=${MA:-0}.${MI:-0}.$(( ${PA:-0} + 1 ))" >> "$GITHUB_OUTPUT"

      - name: Recreate nightly release
        id: create
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;

            // Delete ALL existing "nightly" releases (including leftover drafts, which
            // have no real git tag and so can't be found via getReleaseByTag).
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner, repo, per_page: 100,
            });
            for (const r of releases) {
              if (r.tag_name === 'nightly') {
                await github.rest.repos.deleteRelease({ owner, repo, release_id: r.id });
              }
            }
            // Delete the nightly git tag if it was ever materialized by a published run.
            try {
              await github.rest.git.deleteRef({ owner, repo, ref: 'tags/nightly' });
            } catch (e) { /* no existing tag */ }

            const sha = context.sha.substring(0, 7);
            const { data } = await github.rest.repos.createRelease({
              owner, repo,
              tag_name: 'nightly',
              target_commitish: context.sha,
              name: `Nightly Build (${sha})`,
              body: [
                'Automated rolling build of the latest commit on `main`.',
                '',
                `Commit: ${context.sha}`,
                '',
                'Download the bundle for your platform below. The app needs no',
                'installation and can run from removable media; its SQLite database',
                'is created next to the executable on first run.',
                '',
                '> ⚠️ Pre-release / unsigned — macOS and Windows may warn before launch.',
              ].join('\n'),
              draft: true,
              prerelease: true,
            });
            return data.id;

  # 2. Build each platform and upload artifacts to the draft release.
  build-tauri:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest # Intel
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-2025
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libxdo-dev \
            libgtk-3-dev

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust dependency cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm install

      - name: Set nightly version (latest release + 1 patch)
        run: node scripts/set-version.mjs "${{ needs.create-release.outputs.nightly_version }}"

      - name: Build and upload
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

      - name: Package portable Windows build
        if: matrix.platform == 'windows-2025'
        shell: pwsh
        run: |
          $exe = Get-ChildItem "src-tauri/target/release" -Filter *.exe -File |
                 Where-Object { $_.Name -notlike '*setup*' } |
                 Select-Object -First 1
          if (-not $exe) { throw "No portable .exe found in src-tauri/target/release" }
          New-Item -ItemType Directory -Force -Path portable | Out-Null
          Copy-Item $exe.FullName "portable/ICS-309 Logger.exe"
          @"
          ICS-309 Logger - Portable Windows build

          No installation required. Double-click "ICS-309 Logger.exe" to run.
          Copy this folder to a USB flash drive to run it from there; the database
          (ics309_data.db) is created next to the executable.

          Requires the Microsoft WebView2 runtime, preinstalled on Windows 11 and
          most up-to-date Windows 10 systems. If the app will not start, install it:
          https://developer.microsoft.com/microsoft-edge/webview2/
          "@ | Set-Content -Path "portable/README.txt"
          Compress-Archive -Path "portable/*" -DestinationPath "ICS-309-Logger_portable_windows_x64.zip" -Force

      - name: Attach portable Windows build to release
        if: matrix.platform == 'windows-2025'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const name = 'ICS-309-Logger_portable_windows_x64.zip';
            const data = fs.readFileSync(name);
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              name,
              data,
              headers: {
                'content-type': 'application/zip',
                'content-length': data.length,
              },
            });

  # 2b. Build the Android APK and attach it to the same nightly release.
  android:
    needs: create-release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Build & verify Android APK
        id: build
        uses: ./.github/actions/android-build
        with:
          version: ${{ needs.create-release.outputs.nightly_version }}

      - name: Attach APK to nightly release
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const src = '${{ steps.build.outputs.apk-path }}';
            const data = fs.readFileSync(src);
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              name: 'ICS-309-Logger_${{ needs.create-release.outputs.nightly_version }}_android.apk',
              data,
              headers: {
                'content-type': 'application/vnd.android.package-archive',
                'content-length': data.length,
              },
            });

  # 3. Publish the draft release (flip draft -> published).
  publish-release:
    needs: [create-release, build-tauri, android]
    runs-on: ubuntu-latest
    steps:
      - name: Publish nightly release
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            await github.rest.repos.updateRelease({
              owner, repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
              prerelease: true,
            });
