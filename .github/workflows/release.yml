name: Release

# Build and publish ICS-309 Logger for macOS, Linux, and Windows.
#
# Triggers:
#   • Pushing a version tag (e.g. v0.1.0) builds and publishes a release for that tag.
#   • Manual "Run workflow" (workflow_dispatch) builds a release using the version
#     from src-tauri/tauri.conf.json (tag app-v<version>).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest # Intel
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libxdo-dev \
            libgtk-3-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust dependency cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm install

      - name: Build and publish release
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'app-v__VERSION__' }}
          releaseName: "ICS-309 Logger ${{ github.ref_type == 'tag' && github.ref_name || 'v__VERSION__' }}"
          releaseBody: |
            ICS-309 Communications Logger — runs without installing.

            **Just run it (no install):**
            • **Windows** — `ICS-309-Logger_portable_windows_x64.zip` → unzip, double-click the .exe.
            • **macOS** — open the `.dmg` and drag the app to your drive (or a folder), then run it.
            • **Linux** — the `.AppImage`: `chmod +x` and run.

            Installers (`.msi`/setup `.exe`, `.deb`, `.rpm`) are also provided if you prefer.
            The SQLite database is created next to the app, so the whole log travels with it.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Package portable Windows build
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $exe = Get-ChildItem "src-tauri/target/release" -Filter *.exe -File |
                 Where-Object { $_.Name -notlike '*setup*' } |
                 Select-Object -First 1
          if (-not $exe) { throw "No portable .exe found in src-tauri/target/release" }
          New-Item -ItemType Directory -Force -Path portable | Out-Null
          Copy-Item $exe.FullName "portable/ICS-309 Logger.exe"
          @"
          ICS-309 Logger - Portable Windows build

          No installation required. Double-click "ICS-309 Logger.exe" to run.
          Copy this folder to a USB flash drive to run it from there; the database
          (ics309_data.db) is created next to the executable.

          Requires the Microsoft WebView2 runtime, preinstalled on Windows 11 and
          most up-to-date Windows 10 systems. If the app will not start, install it:
          https://developer.microsoft.com/microsoft-edge/webview2/
          "@ | Set-Content -Path "portable/README.txt"
          Compress-Archive -Path "portable/*" -DestinationPath "ICS-309-Logger_portable_windows_x64.zip" -Force

      - name: Attach portable Windows build to release
        if: matrix.platform == 'windows-latest'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const name = 'ICS-309-Logger_portable_windows_x64.zip';
            const data = fs.readFileSync(name);
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ steps.tauri.outputs.releaseId }},
              name,
              data,
              headers: {
                'content-type': 'application/zip',
                'content-length': data.length,
              },
            });
