name: Release

# Build and publish ICS-309 Logger for macOS, Linux, and Windows.
#
# Triggers:
#   • Pushing a version tag (e.g. v0.1.0) builds and publishes a release for that tag.
#   • Manual "Run workflow" (workflow_dispatch) builds a release using the version
#     from src-tauri/tauri.conf.json (tag app-v<version>).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest # Intel
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libxdo-dev \
            libgtk-3-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust dependency cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm install

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'app-v__VERSION__' }}
          releaseName: "ICS-309 Logger ${{ github.ref_type == 'tag' && github.ref_name || 'v__VERSION__' }}"
          releaseBody: |
            ICS-309 Communications Logger — portable desktop build.

            Download the installer/bundle for your platform from the assets below.
            The app needs no installation and can be run from removable media; its
            SQLite database is created next to the executable on first run.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
