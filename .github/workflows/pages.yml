name: Deploy Pages

# Publish the static landing page in site/ to GitHub Pages. Screenshots are copied
# in from docs/screenshots at build time (kept in one place, auto-updated by
# screenshots.yml), so the repo carries no duplicate images.
on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "docs/screenshots/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - name: Assemble site
        run: |
          mkdir -p site/screenshots
          cp docs/screenshots/*.png site/screenshots/
          cp docs/screenshots/*.gif site/screenshots/ 2>/dev/null || true
          touch site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
